name: CI

# Runs on every pull request to main (the required gate) and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    env:
      # Placeholder values — CI only typechecks/lints/builds; it never connects
      # to a database or a real provider. Real secrets live in deploy env vars.
      DATABASE_URL: "file:./ci.db"
      ONEPANE_ENCRYPTION_KEY: "ci-placeholder-key"
      AUTH_SECRET: "ci-placeholder-secret"
      GOOGLE_CLIENT_ID: "ci-placeholder"
      GOOGLE_CLIENT_SECRET: "ci-placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
